<!doctype html>
<html lang="th" class="h-full bg-gray-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT Admin - ระบบแจ้งซ่อม</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Kanit', sans-serif; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; animation: fadeIn 0.2s ease-out; }
    .modal-content { background: white; border-radius: 12px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .spinner { border: 3px solid rgba(0,0,0,0.1); width: 20px; height: 20px; border-radius: 50%; border-left-color: #2563eb; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="h-full flex flex-col text-gray-800">

  <div id="login-modal" class="modal active">
    <div class="modal-content p-8 text-center">
      <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
      </div>
      <h2 class="text-2xl font-bold mb-2">เข้าสู่ระบบช่างไอที</h2>
      <p class="text-gray-500 mb-6 text-sm">กรุณากรอกรหัสผ่านเพื่อเข้าจัดการระบบแจ้งซ่อม</p>
      
      <input type="password" id="password-input" class="w-full border border-gray-300 rounded-lg p-3 mb-4 focus:ring-2 focus:ring-blue-500 outline-none text-center" placeholder="รหัสผ่าน">
      <button onclick="login()" class="bg-blue-600 hover:bg-blue-700 text-white w-full py-3 rounded-lg font-bold shadow-md transition">เข้าสู่ระบบ</button>
    </div>
  </div>

  <div id="main-app" class="hidden h-full flex flex-col">
    <header class="bg-gray-800 text-white shadow-md">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
        <div>
          <h1 class="text-xl font-bold">IT Admin Dashboard</h1>
          <p class="text-gray-400 text-sm">จัดการงานแจ้งซ่อมอุปกรณ์เทคโนโลยี</p>
        </div>
        <div class="flex gap-2">
          <a href="index.html" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded font-medium text-sm transition text-white">กลับหน้าหลัก</a>
          <button onclick="location.reload()" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded font-medium text-sm transition">ออกจากระบบ</button>
        </div>
      </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="p-6 border-b border-gray-200 flex justify-between items-center bg-gray-50">
          <h2 class="text-xl font-bold">📋 รายการรอดำเนินการ (IT)</h2>
          <button onclick="fetchJobs()" class="text-blue-600 font-semibold text-sm hover:underline flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
            รีเฟรชข้อมูล
          </button>
        </div>
        
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-white border-b border-gray-200 text-sm text-gray-500">
                <th class="p-4 font-semibold">วันที่แจ้ง</th>
                <th class="p-4 font-semibold">ผู้แจ้ง / กลุ่มงาน</th>
                <th class="p-4 font-semibold">รายการครุภัณฑ์ / อาการ</th>
                <th class="p-4 font-semibold">รูปภาพ</th>
                <th class="p-4 font-semibold">จัดการ</th>
              </tr>
            </thead>
            <tbody id="job-list">
              <tr><td colspan="5" class="p-8 text-center text-gray-500"><div class="spinner mr-2"></div> กำลังโหลดข้อมูล...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="detail-modal" class="modal p-4">
    <div class="modal-content">
      <div class="px-6 py-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl">
        <h2 class="text-lg font-bold text-gray-800">✅ อนุมัติงานซ่อม</h2>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl font-bold leading-none">&times;</button>
      </div>
      
      <div class="p-6">
        <div class="mb-5 bg-blue-50 p-4 rounded-lg border border-blue-100 text-sm">
          <p class="mb-1"><strong>ผู้แจ้ง:</strong> <span id="modal-name" class="text-blue-800"></span></p>
          <p class="mb-1"><strong>รายการ:</strong> <span id="modal-item" class="text-blue-800"></span></p>
          <p><strong>อาการ:</strong> <span id="modal-reason" class="text-blue-800"></span></p>
        </div>

        <input type="hidden" id="modal-rowId">
        
        <div class="mb-4">
          <label class="block font-semibold mb-2 text-sm">ความคิดเห็นช่างไอที <span class="text-red-500">*</span></label>
          <textarea id="it-reason" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none" rows="3" placeholder="ระบุผลการตรวจสอบ หรือการแก้ไข"></textarea>
        </div>

        <div class="mb-6">
          <label class="block font-semibold mb-2 text-sm">ลงชื่อเจ้าหน้าที่ <span class="text-red-500">*</span></label>
          <select id="it-name" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none">
            <option value="">-- เลือกเจ้าหน้าที่ผู้รับผิดชอบ --</option>
            <option value="นายจักรินทร์ จันทรักษ์">นายจักรินทร์ จันทรักษ์</option>
            <option value="นายชัยสวัสดิ์ เกตุมา">นายชัยสวัสดิ์ เกตุมา</option>
          </select>
        </div>

        <button id="approve-btn" onclick="approveJob()" class="bg-green-600 hover:bg-green-700 text-white w-full py-3 rounded-lg text-lg font-bold shadow-md transition">
          บันทึกผลและสร้าง PDF
        </button>
      </div>
    </div>
  </div>

  <script>
    // 🛑 ใช้ SCRIPT_URL ที่เป็นลิงก์ API ของคุณ
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxtvUZ4DeWglG5qb_fAlTOSrLz5XjeQgEm6aGtZIGJZay_wBCjVJeyEmbzg4ebkzbc-GA/exec';

    let jobsData = [];

    // ระบบล็อกอินง่ายๆ
    function login() {
      const pass = document.getElementById('password-input').value;
      if (pass === 'admin123') { 
        document.getElementById('login-modal').classList.remove('active');
        document.getElementById('main-app').classList.remove('hidden');
        fetchJobs();
      } else {
        alert('❌ รหัสผ่านไม่ถูกต้อง');
      }
    }

    // กด Enter เพื่อล็อกอินได้
    document.getElementById('password-input').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') login();
    });

    // ดึงงานที่รอดำเนินการผ่าน fetch API (GET)
    function fetchJobs() {
      document.getElementById('job-list').innerHTML = '<tr><td colspan="5" class="p-8 text-center text-gray-500"><div class="spinner mr-2"></div> กำลังโหลดข้อมูล...</td></tr>';
      
      fetch(SCRIPT_URL + '?action=getPendingITJobs')
        .then(response => response.json())
        .then(data => renderJobs(data))
        .catch(error => console.error("Error fetching jobs:", error));
    }

    // แสดงผลตาราง
    function renderJobs(jobs) {
      jobsData = jobs;
      const tbody = document.getElementById('job-list');
      
      if (jobs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-green-600 font-bold text-lg">🎉 เยี่ยมมาก! ไม่มีงานแจ้งซ่อมไอทีค้างอยู่เลย</td></tr>';
        return;
      }

      tbody.innerHTML = jobs.map((job, index) => {
        // สร้างปุ่มดูรูปภาพ (ถ้ามี)
        let imgBtn = job.imageUrl 
          ? `<a href="${job.imageUrl}" target="_blank" class="text-blue-500 hover:underline text-xs flex items-center gap-1"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg> ดูรูป</a>` 
          : `<span class="text-gray-400 text-xs">- ไม่มีรูป -</span>`;

        return `
          <tr class="hover:bg-gray-50 transition">
            <td class="p-4 whitespace-nowrap text-gray-500">${job.date}</td>
            <td class="p-4">
              <div class="font-medium text-gray-800">${job.name}</div>
              <div class="text-xs text-gray-500">${job.department}</div>
            </td>
            <td class="p-4">
              <div class="font-medium text-gray-800">${job.item1}</div>
              <div class="text-xs text-gray-500 truncate max-w-xs">${job.reason1}</div>
            </td>
            <td class="p-4">${imgBtn}</td>
            <td class="p-4">
              <button onclick="openModal(${index})" class="bg-blue-100 text-blue-700 px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-blue-200 transition">ตรวจสอบ</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    // จัดการ Modal อนุมัติ
    function openModal(index) {
      const job = jobsData[index];
      document.getElementById('modal-rowId').value = job.rowId;
      document.getElementById('modal-name').innerText = job.name;
      document.getElementById('modal-item').innerText = job.item1;
      document.getElementById('modal-reason').innerText = job.reason1;
      
      // ล้างค่าเก่า
      document.getElementById('it-reason').value = '';
      document.getElementById('it-name').value = '';
      
      document.getElementById('detail-modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('detail-modal').classList.remove('active');
    }

    // กดปุ่มอนุมัติงาน ส่งผ่าน fetch API (POST)
    function approveJob() {
      const rowId = document.getElementById('modal-rowId').value;
      const itReason = document.getElementById('it-reason').value;
      const itName = document.getElementById('it-name').value;

      if(!itReason || !itName) {
        alert("⚠️ กรุณากรอกความเห็นและเลือกชื่อเจ้าหน้าที่ให้ครบถ้วน");
        return;
      }

      const btn = document.getElementById('approve-btn');
      btn.innerHTML = '<div class="spinner mr-2" style="border-left-color: white;"></div> กำลังสร้าง PDF...';
      btn.disabled = true;

      // ยิงข้อมูลไปให้ Google Apps Script เพื่อสร้าง PDF
      fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'approveITJob',
          rowId: rowId,
          itReason: itReason,
          itName: itName
        })
      })
      .then(res => res.json())
      .then(response => {
        if (response.status === 'success') {
          alert("✅ อนุมัติและสร้าง PDF สำเร็จ!");
          closeModal();
          fetchJobs(); // โหลดข้อมูลตารางใหม่
          
          btn.innerHTML = 'บันทึกผลและสร้าง PDF';
          btn.disabled = false;

          window.open(response.data, '_blank'); 
        } else {
          alert("❌ เกิดข้อผิดพลาด: " + response.message);
          btn.innerHTML = 'บันทึกผลและสร้าง PDF';
          btn.disabled = false;
        }
      })
      .catch(error => {
        alert("❌ เกิดข้อผิดพลาด: " + error);
        btn.innerHTML = 'บันทึกผลและสร้าง PDF';
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
